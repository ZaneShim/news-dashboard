<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>뉴스 대시보드</title>
<style>
:root{
  --bg:#f4f6f8; --card:#fff; --text:#1c1e21; --muted:#8a919c; --line:#e4e7eb;
  --accent:#1a3f8b; --side:#fff; --hover:#eef1f5; --on:#1a3f8b; --on-text:#fff;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#0f1216; --card:#1a1e25; --text:#e8eaed; --muted:#9aa3ad; --line:#2a3038;
         --accent:#7ea6ff; --side:#161a20; --hover:#232832; --on:#2f5cc2; --on-text:#fff; }
}
:root[data-theme=dark]{ --bg:#0f1216; --card:#1a1e25; --text:#e8eaed; --muted:#9aa3ad;
  --line:#2a3038; --accent:#7ea6ff; --side:#161a20; --hover:#232832; --on:#2f5cc2; --on-text:#fff; }
:root[data-theme=light]{ --bg:#f4f6f8; --card:#fff; --text:#1c1e21; --muted:#8a919c;
  --line:#e4e7eb; --accent:#1a3f8b; --side:#fff; --hover:#eef1f5; --on:#1a3f8b; --on-text:#fff; }
*{box-sizing:border-box; margin:0}
body{background:var(--bg); color:var(--text);
  font-family:"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif; font-size:15px; line-height:1.5}

/* 레이아웃: 사이드바 + 본문 */
.shell{display:flex; min-height:100vh; max-width:1200px; margin:0 auto}
.side{width:220px; flex:none; background:var(--side); border-right:1px solid var(--line);
  padding:14px 8px; position:sticky; top:0; height:100vh; overflow-y:auto}
.side h1{font-size:16px; padding:4px 10px 12px; display:flex; align-items:center; gap:6px}
.grp{color:var(--muted); font-size:11px; font-weight:bold; padding:12px 10px 4px; letter-spacing:.3px}
.navitem{display:flex; align-items:center; gap:6px; width:100%; padding:7px 10px; border:none;
  background:none; color:var(--text); border-radius:8px; cursor:pointer; font-size:14px; text-align:left}
.navitem:hover{background:var(--hover)}
.navitem.on{background:var(--on); color:var(--on-text); font-weight:bold}
.navitem .nm{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.navitem .ct{font-size:11px; opacity:.7}
.navitem.on .ct{opacity:.85}
.pin{opacity:0; font-size:13px; padding:0 2px; color:var(--muted); background:none; border:none; cursor:pointer}
.navitem:hover .pin{opacity:.6}
.pin.pinned{opacity:1; color:#f0a500}
.navitem:hover .pin.pinned{opacity:1}

.main{flex:1; min-width:0; padding:16px}
.top{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px}
.mtitle{font-size:19px; font-weight:bold; margin-right:auto}
#catSelect{display:none}
input[type=search]{flex:1; min-width:160px; padding:9px 12px; border:1px solid var(--line);
  border-radius:9px; background:var(--card); color:var(--text); font-size:14px}
select{padding:9px 10px; border:1px solid var(--line); border-radius:9px;
  background:var(--card); color:var(--text); font-size:14px}
.stat{color:var(--muted); font-size:12px; margin-bottom:10px}
.card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:8px}
.card a.t{color:var(--text); text-decoration:none; font-weight:bold; font-size:15px}
.card a.t:hover{color:var(--accent)}
.orig{color:var(--muted); font-size:12px; margin-top:2px}
.meta{color:var(--muted); font-size:12px; margin-top:5px; display:flex; gap:8px; flex-wrap:wrap; align-items:center}
.cat{color:var(--accent); font-weight:bold; cursor:pointer}
.lang{border:1px solid var(--line); border-radius:4px; padding:0 5px; font-size:11px}
.tag{background:var(--hover); border-radius:4px; padding:0 6px}
.sum{color:var(--muted); font-size:13px; margin-top:6px}
.more{display:block; width:100%; padding:12px; margin:10px 0 30px; border:1px solid var(--line);
  border-radius:10px; background:var(--card); color:var(--accent); font-size:14px; cursor:pointer}
.empty{text-align:center; color:var(--muted); padding:60px 0}

@media (max-width:760px){
  .side{display:none}
  #catSelect{display:block; flex:1; min-width:140px}
  .mtitle{font-size:17px; width:100%; margin-bottom:4px}
}

#setup{max-width:460px; margin:60px auto; background:var(--card); border:1px solid var(--line);
  border-radius:14px; padding:26px}
#setup h2{font-size:17px; margin-bottom:6px}
#setup p{color:var(--muted); font-size:13px; margin-bottom:14px}
#setup label{display:block; font-size:13px; margin:10px 0 4px}
#setup input{width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px;
  background:var(--bg); color:var(--text); font-size:13px}
#setup button{width:100%; margin-top:16px; padding:11px; border:none; border-radius:9px;
  background:var(--accent); color:#fff; font-size:14px; cursor:pointer}
.err{color:#d33; font-size:13px; margin-top:10px}
</style>
</head>
<body>

<div id="setup" style="display:none">
  <h2>대시보드 연결 설정 (최초 1회)</h2>
  <p>Supabase 대시보드 → Project Settings → API 에서 두 값을 복사해 넣으세요. 이 브라우저에만 저장됩니다.</p>
  <label>Project URL</label>
  <input id="su" placeholder="https://xxxx.supabase.co">
  <label>anon public 키</label>
  <input id="sk" placeholder="eyJhbGciOi...">
  <button onclick="saveSetup()">연결</button>
  <div id="serr" class="err"></div>
</div>

<div class="shell" id="app" style="display:none">
  <nav class="side">
    <h1>📰 뉴스 대시보드</h1>
    <div id="nav"></div>
  </nav>
  <main class="main">
    <div class="top">
      <span class="mtitle" id="mtitle">전체</span>
      <select id="catSelect"></select>
      <input type="search" id="q" placeholder="제목 검색 (Enter)">
      <select id="lang">
        <option value="">전체 언어</option><option value="ko">한국어</option>
        <option value="en">English</option><option value="ja">日本語</option>
      </select>
      <select id="days">
        <option value="1">오늘</option><option value="2" selected>48시간</option>
        <option value="7">7일</option><option value="30">30일</option><option value="">전체</option>
      </select>
    </div>
    <div class="stat" id="stat"></div>
    <div id="list"></div>
    <button class="more" id="more" style="display:none" onclick="loadMore()">더 보기</button>
    <div class="empty" id="empty" style="display:none">조건에 맞는 기사가 없습니다</div>
  </main>
</div>

<script>
const WATCH="워치리스트";
const CUSTOM=["배터리/이차전지","반도체","스마트팩토리/자동화","피지컬AI/로보틱스","AI","IT","부동산","주식"];
const GENERAL=["한국","정치","세계","비즈니스","과학/기술","엔터테인먼트","스포츠","건강"];
const ALL=[WATCH,...CUSTOM,...GENERAL];
const PAGE=100;
let cfg={url:localStorage.getItem("sb_url"), key:localStorage.getItem("sb_key")};
let state={cat:"", offset:0, busy:false, counts:{}};
const getPins=()=>JSON.parse(localStorage.getItem("cat_pins")||"[]").filter(c=>ALL.includes(c));
const setPins=p=>localStorage.setItem("cat_pins",JSON.stringify(p));

function saveSetup(){
  const u=document.getElementById("su").value.trim().replace(/\/$/,"");
  const k=document.getElementById("sk").value.trim();
  if(!u.startsWith("https://")||k.length<30){document.getElementById("serr").textContent="URL 또는 키 형식이 올바르지 않습니다"; return;}
  localStorage.setItem("sb_url",u); localStorage.setItem("sb_key",k); location.reload();
}
async function api(path, headers={}){
  const r=await fetch(cfg.url+path,{headers:{apikey:cfg.key,Authorization:"Bearer "+cfg.key,...headers}});
  if(r.status===401||r.status===403) throw new Error("auth");
  return r;
}
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function dom(u){try{return new URL(u).hostname.replace(/^www\./,"")}catch(e){return ""}}
function fmtT(s){if(!s)return"";const d=new Date(s);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}

function togglePin(cat,ev){
  ev.stopPropagation();
  let p=getPins();
  p = p.includes(cat) ? p.filter(c=>c!==cat) : [cat,...p];
  setPins(p); renderNav();
}

function navRow(cat){
  const label=cat||"전체"; const n=state.counts[cat]??"";
  const pinned=getPins().includes(cat);
  const pinBtn = cat ? `<span class="pin ${pinned?'pinned':''}" title="즐겨찾기"
      onclick="togglePin('${cat.replace(/'/g,"\\'")}',event)">${pinned?'★':'☆'}</span>` : "";
  return `<button class="navitem ${state.cat===cat?'on':''}" onclick="pick('${cat.replace(/'/g,"\\'")}')">
    <span class="nm">${esc(label)}</span>
    <span class="ct">${n===""?"":n.toLocaleString()}</span>${pinBtn}</button>`;
}
function group(title, cats){
  const vis=cats.filter(c=>state.counts[c]); if(!vis.length) return "";
  return `<div class="grp">${title}</div>`+vis.map(navRow).join("");
}
function renderNav(){
  const nav=document.getElementById("nav");
  const pins=getPins().filter(c=>state.counts[c]);
  const inPin=new Set(pins);
  let html=navRow("");                              // 전체
  if(pins.length) html+=`<div class="grp">⭐ 즐겨찾기</div>`+pins.map(navRow).join("");
  html+=group("영업 정보",[WATCH,...CUSTOM].filter(c=>!inPin.has(c)));
  html+=group("종합 뉴스",GENERAL.filter(c=>!inPin.has(c)));
  nav.innerHTML=html;
  // 모바일 드롭다운
  const sel=document.getElementById("catSelect");
  const order=["",...pins,...[WATCH,...CUSTOM,...GENERAL].filter(c=>!inPin.has(c))];
  sel.innerHTML=order.filter(c=>c===""||state.counts[c]).map(c=>
    `<option value="${esc(c)}" ${state.cat===c?"selected":""}>${c||"전체"} ${state.counts[c]?`(${state.counts[c]})`:""}</option>`).join("");
  document.getElementById("mtitle").textContent=state.cat||"전체";
}
function pick(cat){ state.cat=cat; state.offset=0; renderNav(); load(false); }

async function loadCounts(){
  const days=document.getElementById("days").value;
  const dF=days?"&collected_at=gte."+new Date(Date.now()-days*864e5).toISOString():"";
  const res=await Promise.all(["",...ALL].map(async c=>{
    const cF=c?"&category=eq."+encodeURIComponent(c):"";
    try{ const r=await api(`/rest/v1/news_articles?select=id&status=in.(processed,published)${dF}${cF}&limit=1`,
        {Prefer:"count=exact",Range:"0-0"});
      return [c, parseInt((r.headers.get("content-range")||"/0").split("/")[1])||0];
    }catch(e){ return [c,0]; }
  }));
  state.counts={}; res.forEach(([c,n])=>state.counts[c]=n);
  renderNav();
}

function filters(){
  let f="&status=in.(processed,published)";
  const days=document.getElementById("days").value;
  if(days) f+="&collected_at=gte."+new Date(Date.now()-days*864e5).toISOString();
  const lang=document.getElementById("lang").value; if(lang) f+="&lang=eq."+lang;
  if(state.cat) f+="&category=eq."+encodeURIComponent(state.cat);
  const q=document.getElementById("q").value.trim();
  if(q){const s=encodeURIComponent("*"+q.replace(/[%*,()]/g," ").trim()+"*");
    f+=`&or=(title.ilike.${s},title_ko.ilike.${s})`;}
  return f;
}
function render(rows, append){
  const list=document.getElementById("list"); if(!append) list.innerHTML="";
  for(const a of rows){
    const t=a.title_ko||a.title;
    const orig=(a.title_ko&&a.lang!=="ko"&&a.title!==a.title_ko)?`<div class="orig">${esc(a.title)}</div>`:"";
    const L={ko:"한",en:"EN",ja:"日"}[a.lang]||a.lang;
    const tag=a.perspective_tag?`<span class="tag">${esc(a.perspective_tag)}</span>`:"";
    const sum=a.summary_ko?`<div class="sum">${esc(a.summary_ko)}</div>`:"";
    list.insertAdjacentHTML("beforeend",`<div class="card">
      <a class="t" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(t)}</a>${orig}
      <div class="meta"><span class="cat" onclick="pick('${(a.category||'').replace(/'/g,"\\'")}')">${esc(a.category||"미분류")}</span>${tag}
        <span class="lang">${L}</span><span>${esc(a.source_name||dom(a.url))}</span><span>${fmtT(a.published_at)}</span></div>
      ${sum}</div>`);
  }
}
async function load(append){
  if(state.busy) return; state.busy=true;
  try{
    const r=await api(`/rest/v1/news_articles?select=title,title_ko,url,source_name,lang,category,published_at,summary_ko,perspective_tag${filters()}&order=published_at.desc.nullslast&limit=${PAGE}&offset=${state.offset}`,{Prefer:"count=exact"});
    const rows=await r.json();
    const total=parseInt((r.headers.get("content-range")||"/0").split("/")[1])||0;
    render(rows,append); state.offset+=rows.length;
    document.getElementById("stat").textContent=`${(state.cat||"전체")} · ${total.toLocaleString()}건 중 ${Math.min(state.offset,total).toLocaleString()}건`;
    document.getElementById("more").style.display=state.offset<total?"block":"none";
    document.getElementById("empty").style.display=total?"none":"block";
    document.getElementById("mtitle").textContent=state.cat||"전체";
  }catch(e){ if(e.message==="auth"){localStorage.clear(); location.reload();} }
  state.busy=false;
}
function loadMore(){ load(true); }
function refresh(){ state.offset=0; loadCounts(); load(false); }

document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")refresh();});
document.getElementById("lang").addEventListener("change",refresh);
document.getElementById("days").addEventListener("change",refresh);
document.getElementById("catSelect").addEventListener("change",e=>pick(e.target.value));

if(cfg.url&&cfg.key){ document.getElementById("app").style.display="flex"; refresh(); }
else document.getElementById("setup").style.display="block";
</script>
</body>
</html>
