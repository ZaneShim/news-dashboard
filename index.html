<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>뉴스 대시보드</title>
<style>
:root{
  --bg:#f6f7f9; --card:#fff; --text:#1c1e21; --muted:#8a919c; --line:#e4e7eb;
  --accent:#1a3f8b; --chip:#eef1f5; --chip-on:#1a3f8b; --chip-on-text:#fff;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#111418; --card:#1b1f26; --text:#e8eaed; --muted:#9aa3ad; --line:#2a3038;
         --accent:#7ea6ff; --chip:#252b34; --chip-on:#2f5cc2; --chip-on-text:#fff; }
}
*{box-sizing:border-box; margin:0}
body{background:var(--bg); color:var(--text);
  font-family:"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif; font-size:15px; line-height:1.5}
.wrap{max-width:900px; margin:0 auto; padding:16px}
h1{font-size:20px; padding:4px 0 12px}
h1 small{color:var(--muted); font-weight:normal; font-size:13px; margin-left:8px}
.bar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px}
input[type=search]{flex:1; min-width:180px; padding:9px 12px; border:1px solid var(--line);
  border-radius:9px; background:var(--card); color:var(--text); font-size:14px}
select{padding:9px 10px; border:1px solid var(--line); border-radius:9px;
  background:var(--card); color:var(--text); font-size:14px}
.chips{display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:8px;
  scrollbar-width:thin}
.chip{white-space:nowrap; padding:6px 12px; border-radius:16px; background:var(--chip);
  color:var(--text); font-size:13px; cursor:pointer; border:none}
.chip.on{background:var(--chip-on); color:var(--chip-on-text); font-weight:bold}
.chip .n{opacity:.65; font-size:11px; margin-left:3px}
.stat{color:var(--muted); font-size:12px; margin:2px 0 10px}
.card{background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:12px 14px; margin-bottom:8px}
.card a.t{color:var(--text); text-decoration:none; font-weight:bold; font-size:15px}
.card a.t:hover{color:var(--accent)}
.orig{color:var(--muted); font-size:12px; margin-top:2px}
.meta{color:var(--muted); font-size:12px; margin-top:5px; display:flex; gap:8px; flex-wrap:wrap; align-items:center}
.cat{color:var(--accent); font-weight:bold}
.lang{border:1px solid var(--line); border-radius:4px; padding:0 5px; font-size:11px}
.tag{background:var(--chip); border-radius:4px; padding:0 6px}
.sum{color:var(--muted); font-size:13px; margin-top:6px}
.more{display:block; width:100%; padding:12px; margin:10px 0 30px; border:1px solid var(--line);
  border-radius:10px; background:var(--card); color:var(--accent); font-size:14px; cursor:pointer}
.empty{text-align:center; color:var(--muted); padding:60px 0}
/* 설정 화면 */
#setup{max-width:460px; margin:60px auto; background:var(--card); border:1px solid var(--line);
  border-radius:14px; padding:26px}
#setup h2{font-size:17px; margin-bottom:6px}
#setup p{color:var(--muted); font-size:13px; margin-bottom:14px}
#setup label{display:block; font-size:13px; margin:10px 0 4px}
#setup input{width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px;
  background:var(--bg); color:var(--text); font-size:13px}
#setup button{width:100%; margin-top:16px; padding:11px; border:none; border-radius:9px;
  background:var(--accent); color:#fff; font-size:14px; cursor:pointer}
.err{color:#d33; font-size:13px; margin-top:10px}
</style>
</head>
<body>

<div id="setup" style="display:none">
  <h2>대시보드 연결 설정 (최초 1회)</h2>
  <p>Supabase 대시보드 → Project Settings → API 에서 두 값을 복사해 넣으세요.
     이 브라우저에만 저장됩니다.</p>
  <label>Project URL</label>
  <input id="su" placeholder="https://xxxx.supabase.co">
  <label>anon public 키</label>
  <input id="sk" placeholder="eyJhbGciOi...">
  <button onclick="saveSetup()">연결</button>
  <div id="serr" class="err"></div>
</div>

<div class="wrap" id="app" style="display:none">
  <h1>📰 뉴스 대시보드 <small id="updated"></small></h1>
  <div class="bar">
    <input type="search" id="q" placeholder="제목 검색 (Enter)">
    <select id="lang">
      <option value="">전체 언어</option><option value="ko">한국어</option>
      <option value="en">English</option><option value="ja">日本語</option>
    </select>
    <select id="days">
      <option value="1">오늘(24h)</option><option value="2" selected>48시간</option>
      <option value="7">7일</option><option value="30">30일</option><option value="">전체</option>
    </select>
  </div>
  <div class="chips" id="chips"></div>
  <div class="stat" id="stat"></div>
  <div id="list"></div>
  <button class="more" id="more" style="display:none" onclick="loadMore()">더 보기</button>
  <div class="empty" id="empty" style="display:none">조건에 맞는 기사가 없습니다</div>
</div>

<script>
const CATS = ["워치리스트","배터리/이차전지","반도체","스마트팩토리/자동화","피지컬AI/로보틱스",
  "AI","IT","부동산","주식","한국","정치","세계","비즈니스","과학/기술","엔터테인먼트","스포츠","건강"];
const PAGE = 100;
let cfg = {url: localStorage.getItem("sb_url"), key: localStorage.getItem("sb_key")};
let state = {cat:"", offset:0, busy:false};

function saveSetup(){
  const u=document.getElementById("su").value.trim().replace(/\/$/,"");
  const k=document.getElementById("sk").value.trim();
  if(!u.startsWith("https://")||k.length<30){
    document.getElementById("serr").textContent="URL 또는 키 형식이 올바르지 않습니다"; return;
  }
  localStorage.setItem("sb_url",u); localStorage.setItem("sb_key",k);
  location.reload();
}

async function api(path, headers={}){
  const r = await fetch(cfg.url+path, {headers:{
    apikey:cfg.key, Authorization:"Bearer "+cfg.key, ...headers}});
  if(r.status===401||r.status===403) throw new Error("auth");
  return r;
}

function filters(){
  let f = "&status=in.(processed,published)";
  const days=document.getElementById("days").value;
  if(days) f += "&collected_at=gte."+new Date(Date.now()-days*864e5).toISOString();
  const lang=document.getElementById("lang").value;
  if(lang) f += "&lang=eq."+lang;
  if(state.cat) f += "&category=eq."+encodeURIComponent(state.cat);
  const q=document.getElementById("q").value.trim();
  if(q){ const s=encodeURIComponent("*"+q.replace(/[%*,()]/g," ").trim()+"*");
         f += `&or=(title.ilike.${s},title_ko.ilike.${s})`; }
  return f;
}

async function loadCounts(){
  const days=document.getElementById("days").value;
  const dateF = days? "&collected_at=gte."+new Date(Date.now()-days*864e5).toISOString() : "";
  const results = await Promise.all(["", ...CATS].map(async c=>{
    const catF = c? "&category=eq."+encodeURIComponent(c) : "";
    try{
      const r = await api(`/rest/v1/news_articles?select=id&status=in.(processed,published)${dateF}${catF}&limit=1`,
        {Prefer:"count=exact", Range:"0-0"});
      return parseInt((r.headers.get("content-range")||"/0").split("/")[1])||0;
    }catch(e){ return 0; }
  }));
  const chips=document.getElementById("chips"); chips.innerHTML="";
  ["", ...CATS].forEach((c,i)=>{
    if(c && !results[i]) return;             // 0건 카테고리 칩 숨김
    const b=document.createElement("button");
    b.className="chip"+(state.cat===c?" on":"");
    b.innerHTML=(c||"전체")+`<span class="n">${results[i].toLocaleString()}</span>`;
    b.onclick=()=>{state.cat=c; refresh();};
    chips.appendChild(b);
  });
}

function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function domain(u){try{return new URL(u).hostname.replace(/^www\./,"")}catch(e){return ""}}
function fmtT(s){if(!s)return"";const d=new Date(s);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}

function render(rows, append){
  const list=document.getElementById("list");
  if(!append) list.innerHTML="";
  for(const a of rows){
    const t = a.title_ko || a.title;
    const orig = (a.title_ko && a.lang!=="ko" && a.title!==a.title_ko)
      ? `<div class="orig">${esc(a.title)}</div>` : "";
    const langLabel={ko:"한",en:"EN",ja:"日"}[a.lang]||a.lang;
    const tag = a.perspective_tag? `<span class="tag">${esc(a.perspective_tag)}</span>` : "";
    const sum = a.summary_ko? `<div class="sum">${esc(a.summary_ko)}</div>` : "";
    list.insertAdjacentHTML("beforeend", `<div class="card">
      <a class="t" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(t)}</a>${orig}
      <div class="meta"><span class="cat">${esc(a.category||"미분류")}</span>${tag}
        <span class="lang">${langLabel}</span>
        <span>${esc(a.source_name||domain(a.url))}</span><span>${fmtT(a.published_at)}</span></div>
      ${sum}</div>`);
  }
}

async function load(append){
  if(state.busy) return; state.busy=true;
  try{
    const r = await api(`/rest/v1/news_articles?select=title,title_ko,url,source_name,lang,category,published_at,summary_ko,perspective_tag${filters()}&order=published_at.desc.nullslast&limit=${PAGE}&offset=${state.offset}`,
      {Prefer:"count=exact"});
    const rows = await r.json();
    const total = parseInt((r.headers.get("content-range")||"/0").split("/")[1])||0;
    render(rows, append);
    state.offset += rows.length;
    document.getElementById("stat").textContent =
      `${total.toLocaleString()}건 중 ${Math.min(state.offset,total).toLocaleString()}건 표시` +
      (state.cat? ` · ${state.cat}`:"");
    document.getElementById("more").style.display = state.offset<total? "block":"none";
    document.getElementById("empty").style.display = total? "none":"block";
    document.getElementById("updated").textContent = "갱신 "+fmtT(new Date().toISOString());
  }catch(e){
    if(e.message==="auth"){ localStorage.clear(); location.reload(); }
  }
  state.busy=false;
}
function loadMore(){ load(true); }
function refresh(){ state.offset=0; loadCounts(); load(false); }

document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")refresh();});
document.getElementById("lang").addEventListener("change",refresh);
document.getElementById("days").addEventListener("change",refresh);

if(cfg.url && cfg.key){ document.getElementById("app").style.display="block"; refresh(); }
else document.getElementById("setup").style.display="block";
</script>
</body>
</html>
